<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON 美化工具 - 在线 JSON 美化 beautifier - BeJSON</title>
    <meta name="description" content="免费的JSON美化工具，支持多种样式主题、缩进风格、颜色高亮。">
    <meta name="keywords" content="JSON美化,JSON beautifier,在线JSON美化,JSON格式化">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .beautifier-container {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .input-panel, .output-panel {
            flex: 1;
            min-width: 0;
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .panel-header h3 {
            color: var(--dark-color);
            margin: 0;
        }
        .json-textarea {
            width: 100%;
            min-height: 450px;
            padding: 15px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', 'Consolas', monospace;
            font-size: 14px;
            line-height: 1.6;
            background: #1e1e1e;
            color: #d4d4d4;
            resize: vertical;
            tab-size: 2;
        }
        .json-textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        .output-area {
            min-height: 450px;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', 'Consolas', monospace;
            font-size: 14px;
            line-height: 1.6;
            overflow: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .output-area.error {
            background: #ffe6e6;
            color: var(--error-color);
            border: 2px solid var(--error-color);
        }
        .beautify-options {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .option-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .option-item label {
            font-weight: 500;
            color: var(--dark-color);
        }
        .option-item select, .option-item input[type="color"] {
            padding: 6px 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 14px;
        }
        .option-item input[type="checkbox"] {
            width: 16px;
            height: 16px;
        }
        .theme-presets {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .theme-btn {
            padding: 6px 12px;
            border: 2px solid var(--border-color);
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        .theme-btn:hover, .theme-btn.active {
            border-color: var(--primary-color);
            background: var(--primary-color);
            color: #fff;
        }
        .theme-btn.dark { background: #1e1e1e; color: #fff; }
        .theme-btn.light { background: #fff; color: #333; }
        .theme-btn.monokai { background: #272822; color: #f8f8f2; }
        .theme-btn.dracula { background: #282a36; color: #f8f8f2; }
        .output-area.theme-dark { background: #1e1e1e; color: #d4d4d4; }
        .output-area.theme-light { background: #ffffff; color: #333333; }
        .output-area.theme-monokai { background: #272822; color: #f8f8f2; }
        .output-area.theme-dracula { background: #282a36; color: #f8f8f2; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <a href="/">BeJSON</a>
            </div>
            <nav>
                <ul class="nav-menu">
                    <li><a href="/#tools">工具</a></li>
                    <li><a href="/#code-gen">代码生成</a></li>
                    <li><a href="/#convert">格式转换</a></li>
                    <li><a href="/#utils">辅助工具</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="tool-page">
        <div class="container">
            <div class="tool-page-header">
                <h1>JSON 美化工具</h1>
                <p>多种主题风格、灵活缩进选项、实时预览</p>
            </div>

            <div class="tool-content">
                <div class="beautify-options">
                    <div class="option-item">
                        <label>缩进：</label>
                        <select id="indent-select" onchange="beautifyJson()">
                            <option value="2" selected>2 空格</option>
                            <option value="4">4 空格</option>
                            <option value="8">8 空格</option>
                            <option value="tab">Tab</option>
                        </select>
                    </div>
                    <div class="option-item">
                        <label>主题：</label>
                        <div class="theme-presets">
                            <button class="theme-btn dark active" onclick="setTheme('dark')">深色</button>
                            <button class="theme-btn light" onclick="setTheme('light')">浅色</button>
                            <button class="theme-btn monokai" onclick="setTheme('monokai')">Monokai</button>
                            <button class="theme-btn dracula" onclick="setTheme('dracula')">Dracula</button>
                        </div>
                    </div>
                    <div class="option-item">
                        <label>
                            <input type="checkbox" id="sort-keys" onchange="beautifyJson()"> 按键排序
                        </label>
                    </div>
                    <div class="option-item">
                        <label>
                            <input type="checkbox" id="ascii-only" onchange="beautifyJson()"> 转义 ASCII
                        </label>
                    </div>
                </div>

                <div class="beautifier-container">
                    <div class="input-panel">
                        <div class="panel-header">
                            <h3>原始 JSON</h3>
                            <div>
                                <button class="btn btn-secondary" onclick="sampleJson()">示例</button>
                                <button class="btn" onclick="beautifyJson()">美化</button>
                            </div>
                        </div>
                        <textarea id="json-input" class="json-textarea" placeholder='{"name": "BeJSON", "features": ["格式化", "压缩", "校验"]}'></textarea>
                    </div>
                    <div class="output-panel">
                        <div class="panel-header">
                            <h3>美化结果</h3>
                            <button class="btn btn-secondary" onclick="copyResult()">复制结果</button>
                        </div>
                        <div id="json-output" class="output-area theme-dark">点击"美化"按钮查看结果</div>
                    </div>
                </div>

                <div id="status-message" class="status"></div>
            </div>

            <div class="tool-content" style="margin-top: 30px;">
                <h3>使用说明</h3>
                <ul style="margin: 15px 0 0 20px; line-height: 2;">
                    <li>将 JSON 数据粘贴到左侧输入框</li>
                    <li>选择缩进方式和主题风格</li>
                    <li>点击"美化"按钮或自动实时预览</li>
                    <li>点击"复制结果"一键复制美化后的 JSON</li>
                </ul>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 BeJSON. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="../js/app.js"></script>
    <script>
        let currentTheme = 'dark';
        
        function getIndent() {
            const select = document.getElementById('indent-select');
            return select.value === 'tab' ? '\t' : parseInt(select.value);
        }
        
        function setTheme(theme) {
            currentTheme = theme;
            document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.theme-btn.${theme}`).classList.add('active');
            
            const output = document.getElementById('json-output');
            output.className = 'output-area theme-' + theme;
            
            beautifyJson();
        }
        
        function beautifyJson() {
            const input = document.getElementById('json-input').value;
            const output = document.getElementById('json-output');
            
            if (!input.trim()) {
                output.innerHTML = '点击"美化"按钮查看结果';
                output.className = 'output-area theme-' + currentTheme;
                showStatus('请输入 JSON 数据', 'error');
                return;
            }
            
            const indent = getIndent();
            const sortKeys = document.getElementById('sort-keys').checked;
            const asciiOnly = document.getElementById('ascii-only').checked;
            
            try {
                let parsed = JSON.parse(input);
                if (sortKeys) {
                    parsed = sortObjectKeys(parsed);
                }
                
                const options = [];
                if (asciiOnly) options.push('escape');
                
                const formatted = JSON.stringify(parsed, null, indent);
                
                output.innerHTML = syntaxHighlight(formatted);
                output.className = 'output-area theme-' + currentTheme;
                showStatus('JSON 美化成功 ✓', 'success');
            } catch (e) {
                output.textContent = '错误: ' + e.message;
                output.className = 'output-area error';
                showStatus('JSON 格式错误: ' + e.message, 'error');
            }
        }
        
        function sortObjectKeys(obj) {
            if (Array.isArray(obj)) {
                return obj.map(sortObjectKeys);
            }
            if (obj !== null && typeof obj === 'object') {
                return Object.keys(obj).sort().reduce((result, key) => {
                    result[key] = sortObjectKeys(obj[key]);
                    return result;
                }, {});
            }
            return obj;
        }
        
        function copyResult() {
            const output = document.getElementById('json-output');
            const text = output.textContent;
            if (text.includes('错误:') || text.includes('点击"美化"')) {
                showStatus('没有可复制的内容', 'error');
                return;
            }
            copyToClipboard(text);
            showStatus('已复制到剪贴板 ✓', 'success');
        }
        
        function sampleJson() {
            const sample = {
                "name": "BeJSON",
                "description": "免费的在线JSON工具网站",
                "features": ["格式化", "压缩", "校验", "美化", "转换"],
                "version": "1.0.0",
                "author": {
                    "name": "BeJSON Team",
                    "email": "contact@bejson.org"
                },
                "stats": {
                    "users": 10000,
                    "dailyRequests": 50000,
                    "uptime": 99.9
                }
            };
            document.getElementById('json-input').value = JSON.stringify(sample, null, 2);
            beautifyJson();
        }
        
        function showStatus(message, type) {
            const status = document.getElementById('status-message');
            status.textContent = message;
            status.className = 'status ' + type;
            status.style.display = 'block';
            setTimeout(() => {
                status.style.display = 'none';
            }, 3000);
        }
        
        // Auto beautify on input
        document.addEventListener('DOMContentLoaded', function() {
            const input = document.getElementById('json-input');
            let timeout;
            input.addEventListener('input', function() {
                clearTimeout(timeout);
                timeout = setTimeout(beautifyJson, 500);
            });
        });
    </script>
</body>
</html>
