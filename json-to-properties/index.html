<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON 转 Properties - 在线 JSON 转换为 Java Properties - BeJSON</title>
    <meta name="description" content="免费的JSON转Properties在线工具，输入JSON转换为Java Properties格式。">
    <meta name="keywords" name="JSON转Properties,json to properties">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo"><a href="/">BeJSON</a></div>
            <nav>
                <ul class="nav-menu">
                    <li><a href="/#tools">工具</a></li>
                    <li><a href="/#code-gen">代码生成</a></li>
                    <li><a href="/#convert">格式转换</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="tool-page">
        <div class="container">
            <div class="tool-page-header">
                <h1>JSON 转 Properties</h1>
                <p>输入 JSON，转换为 Java Properties 格式</p>
            </div>

            <div class="tool-content">
                <div class="editor-container">
                    <textarea id="json-input" placeholder="输入 JSON 数据..."></textarea>
                    <textarea id="output" class="output-area" readonly placeholder="生成的 Properties..."></textarea>
                </div>

                <div class="tool-actions" style="margin-top:20px;">
                    <button class="btn" onclick="convert()">转换</button>
                    <button class="btn btn-secondary" onclick="copyResult()">复制</button>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container"><div class="footer-bottom"><p>&copy; 2026 BeJSON. All rights reserved.</p></div></div>
    </footer>

    <script src="../js/app.js"></script>
    <script>
        function convert() {
            const input = document.getElementById('json-input').value;
            const output = document.getElementById('output');
            
            if (!input.trim()) {
                showToast('请输入 JSON 数据', 'error');
                return;
            }
            
            try {
                const result = jsonToProperties(input);
                output.value = result;
                showToast('转换成功', 'success');
            } catch (e) {
                showToast('转换失败: ' + e.message, 'error');
            }
        }
        
        function jsonToProperties(json) {
            const obj = JSON.parse(json);
            
            function flatten(obj, prefix = '') {
                let props = '';
                
                for (const [key, value] of Object.entries(obj)) {
                    const propKey = prefix ? prefix + '.' + key : key;
                    
                    if (value !== null && typeof value === 'object') {
                        props += flatten(value, propKey);
                    } else {
                        props += propKey + '=' + (value === null ? '' : value) + '\n';
                    }
                }
                
                return props;
            }
            
            return flatten(obj);
        }
        
        function copyResult() {
            copyToClipboard(document.getElementById('output').value);
        }
    </script>
</body>
</html>
