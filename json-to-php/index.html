<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON 转 PHP - 在线生成 PHP 数组 - BeJSON</title>
    <meta name="description" content="免费的JSON转PHP在线工具，输入JSON自动生成PHP数组。">
    <meta name="keywords" content="JSON转PHP,json to php,JSON生成PHP">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo"><a href="/">BeJSON</a></div>
            <nav>
                <ul class="nav-menu">
                    <li><a href="/#tools">工具</a></li>
                    <li><a href="/#code-gen">代码生成</a></li>
                    <li><a href="/#convert">格式转换</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="tool-page">
        <div class="container">
            <div class="tool-page-header">
                <h1>JSON 转 PHP</h1>
                <p>输入 JSON，自动生成 PHP 数组</p>
            </div>

            <div class="tool-content">
                <div class="editor-container">
                    <textarea id="json-input" placeholder="输入 JSON 数据..."></textarea>
                    <textarea id="output" class="output-area" readonly placeholder="生成的 PHP 代码..."></textarea>
                </div>

                <div class="tool-actions" style="margin-top:20px;">
                    <button class="btn" onclick="convert()">转换</button>
                    <button class="btn btn-secondary" onclick="copyResult()">复制</button>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container"><div class="footer-bottom"><p>&copy; 2026 BeJSON. All rights reserved.</p></div></div>
    </footer>

    <script src="../js/app.js"></script>
    <script>
        function convert() {
            const input = document.getElementById('json-input').value;
            const output = document.getElementById('output');
            
            if (!input.trim()) {
                showToast('请输入 JSON 数据', 'error');
                return;
            }
            
            try {
                const parsed = JSON.parse(input);
                const result = jsonToPhp(parsed);
                output.value = result;
                showToast('转换成功', 'success');
            } catch (e) {
                showToast('转换失败: ' + e.message, 'error');
            }
        }
        
        function jsonToPhp(obj) {
            function convert(obj, indent = 0) {
                const spaces = '    '.repeat(indent);
                
                if (obj === null) return 'null';
                if (typeof obj === 'string') return "'" + obj.replace(/'/g, "\\'") + "'";
                if (typeof obj === 'number') return obj;
                if (typeof obj === 'boolean') return obj ? 'true' : 'false';
                if (Array.isArray(obj)) {
                    if (obj.length === 0) return '[]';
                    const items = obj.map(item => spaces + '    ' + convert(item, indent + 1));
                    return '[\n' + items.join(',\n') + '\n' + spaces + ']';
                }
                if (typeof obj === 'object') {
                    const keys = Object.keys(obj);
                    if (keys.length === 0) return '[]';
                    const items = keys.map(key => {
                        return spaces + "    '" + key + "' => " + convert(obj[key], indent + 1);
                    });
                    return '[\n' + items.join(',\n') + '\n' + spaces + ']';
                }
                return 'null';
            }
            
            return '<?php\n\n$data = ' + convert(obj) + ';\n';
        }
        
        function copyResult() {
            copyToClipboard(document.getElementById('output').value);
        }
    </script>
</body>
</html>
