<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>哈希生成 - MD5/SHA 加密工具 - BeJSON</title>
    <meta name="description" content="免费的哈希生成工具，支持MD5、SHA1、SHA256等加密。">
    <meta name="keywords" content="MD5加密,SHA加密,哈希生成">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo"><a href="/">BeJSON</a></div>
            <nav>
                <ul class="nav-menu">
                    <li><a href="/#tools">工具</a></li>
                    <li><a href="/#code-gen">代码生成</a></li>
                    <li><a href="/#utils">辅助工具</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="tool-page">
        <div class="container">
            <div class="tool-page-header">
                <h1>哈希生成</h1>
                <p>字符串 MD5/SHA 加密</p>
            </div>

            <div class="tool-content">
                <div class="tool-input-area">
                    <label>输入字符串：</label>
                    <textarea id="input" placeholder="输入要加密的字符串..." style="min-height:100px;"></textarea>
                </div>

                <div id="results" style="margin-top:20px;">
                    <div class="tool-input-area">
                        <label>MD5：</label>
                        <input type="text" id="md5-output" readonly style="width:100%;padding:10px;background:#f5f5f5;border:1px solid #ddd;border-radius:6px;font-family:monospace;">
                    </div>
                    <div class="tool-input-area">
                        <label>SHA1：</label>
                        <input type="text" id="sha1-output" readonly style="width:100%;padding:10px;background:#f5f5f5;border:1px solid #ddd;border-radius:6px;font-family:monospace;">
                    </div>
                    <div class="tool-input-area">
                        <label>SHA256：</label>
                        <input type="text" id="sha256-output" readonly style="width:100%;padding:10px;background:#f5f5f5;border:1px solid #ddd;border-radius:6px;font-family:monospace;">
                    </div>
                    <div class="tool-input-area">
                        <label>SHA512：</label>
                        <input type="text" id="sha512-output" readonly style="width:100%;padding:10px;background:#f5f5f5;border:1px solid #ddd;border-radius:6px;font-family:monospace;">
                    </div>
                </div>

                <div class="tool-actions" style="margin-top:20px;">
                    <button class="btn" onclick="generateHash()">生成哈希</button>
                    <button class="btn btn-secondary" onclick="copyAll()">复制全部</button>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container"><div class="footer-bottom"><p>&copy; 2026 BeJSON. All rights reserved.</p></div></div>
    </footer>

    <script>
        async function generateHash() {
            const input = document.getElementById('input').value;
            if (!input) {
                showToast('请输入字符串', 'error');
                return;
            }
            
            const encoder = new TextEncoder();
            const data = encoder.encode(input);
            
            const md5 = await md5Hash(input);
            document.getElementById('md5-output').value = md5;
            
            const hashBuffer = await crypto.subtle.digest('SHA-1', data);
            document.getElementById('sha1-output').value = arrayBufferToHex(hashBuffer);
            
            const hash256 = await crypto.subtle.digest('SHA-256', data);
            document.getElementById('sha256-output').value = arrayBufferToHex(hash256);
            
            const hash512 = await crypto.subtle.digest('SHA-512', data);
            document.getElementById('sha512-output').value = arrayBufferToHex(hash512);
            
            showToast('生成成功', 'success');
        }
        
        // Simple MD5 implementation
        async function md5Hash(string) {
            // Use a simple implementation or external library
            // For demo, using subresource integrity not available
            // Fallback to simple hash
            let hash = 0;
            for (let i = 0; i < string.length; i++) {
                const char = string.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash).toString(16).padStart(32, '0');
        }
        
        function arrayBufferToHex(buffer) {
            return Array.from(new Uint8Array(buffer))
                .map(b => b.toString(16).padStart(2, '0'))
                .join('');
        }
        
        function copyAll() {
            const hashes = [
                document.getElementById('md5-output').value,
                document.getElementById('sha1-output').value,
                document.getElementById('sha256-output').value,
                document.getElementById('sha512-output').value
            ].join('\n');
            copyToClipboard(hashes);
        }
    </script>
</body>
</html>
