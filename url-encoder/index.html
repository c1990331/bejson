<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL 编码 - URL 编码/解码工具 - BeJSON</title>
    <meta name="description" content="免费的URL编码解码工具，支持URL编码、URL解码。">
    <meta name="keywords" name="URL编码,URL解码,urlencode,urldecode">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo"><a href="/">BeJSON</a></div>
            <nav>
                <ul class="nav-menu">
                    <li><a href="/#tools">工具</a></li>
                    <li><a href="/#code-gen">代码生成</a></li>
                    <li><a href="/#utils">辅助工具</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="tool-page">
        <div class="container">
            <div class="tool-page-header">
                <h1>URL 编码/解码</h1>
                <p>URL 参数编码与解码</p>
            </div>

            <div class="tool-content">
                <div class="editor-container">
                    <textarea id="input" placeholder="输入要编码/解码的内容..."></textarea>
                    <textarea id="output" class="output-area" readonly placeholder="转换结果..."></textarea>
                </div>

                <div class="tool-actions" style="margin-top:20px;">
                    <button class="btn" onclick="urlEncode()">URL 编码</button>
                    <button class="btn" onclick="urlDecode()">URL 解码</button>
                    <button class="btn btn-secondary" onclick="copyResult()">复制</button>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container"><div class="footer-bottom"><p>&copy; 2026 BeJSON. All rights reserved.</p></div></div>
    </footer>

    <script src="../js/app.js"></script>
    <script>
        function urlEncode() {
            const input = document.getElementById('input').value;
            document.getElementById('output').value = encodeURIComponent(input);
            showToast('编码成功', 'success');
        }
        
        function urlDecode() {
            const input = document.getElementById('input').value;
            try {
                document.getElementById('output').value = decodeURIComponent(input);
                showToast('解码成功', 'success');
            } catch (e) {
                showToast('解码失败: ' + e.message, 'error');
            }
        }
        
        function copyResult() {
            copyToClipboard(document.getElementById('output').value);
        }
    </script>
</body>
</html>
