<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON 在线编辑器 - 代码编辑器 - BeJSON</title>
    <meta name="description" content="免费的JSON在线代码编辑器，支持语法高亮、实时预览、行号显示。">
    <meta name="keywords" content="JSON编辑器,在线JSON编辑器,代码编辑器,JSON高亮">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .editor-wrapper {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .editor-panel {
            flex: 1;
            min-width: 0;
        }
        .editor-panel h3 {
            margin-bottom: 10px;
            color: var(--dark-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .editor-panel h3 .btn {
            padding: 5px 12px;
            font-size: 12px;
        }
        .code-editor {
            width: 100%;
            min-height: 400px;
            padding: 15px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', 'Consolas', monospace;
            font-size: 14px;
            line-height: 1.6;
            background: var(--code-bg);
            color: #abb2bf;
            resize: vertical;
            tab-size: 2;
        }
        .code-editor:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        .preview-panel {
            background: var(--code-bg);
            color: #abb2bf;
            padding: 15px;
            border-radius: 8px;
            min-height: 400px;
            max-height: 600px;
            overflow: auto;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .preview-panel.error {
            background: #ffe6e6;
            color: var(--error-color);
            border: 1px solid var(--error-color);
        }
        .editor-options {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        .option-group label {
            margin-right: 15px;
        }
        .option-group select {
            padding: 6px 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 14px;
        }
        .option-group input[type="checkbox"] {
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <a href="/">BeJSON</a>
            </div>
            <nav>
                <ul class="nav-menu">
                    <li><a href="/#tools">工具</a></li>
                    <li><a href="/#code-gen">代码生成</a></li>
                    <li><a href="/#convert">格式转换</a></li>
                    <li><a href="/#utils">辅助工具</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="tool-page">
        <div class="container">
            <div class="tool-page-header">
                <h1>JSON 在线编辑器</h1>
                <p>实时预览、语法高亮、行号显示</p>
            </div>

            <div class="tool-content">
                <div class="editor-options">
                    <div class="option-group">
                        <label>缩进：</label>
                        <select id="indent-select" onchange="updatePreview()">
                            <option value="2" selected>2 空格</option>
                            <option value="4">4 空格</option>
                            <option value="tab">Tab</option>
                        </select>
                    </div>
                    <div class="option-group">
                        <label>
                            <input type="checkbox" id="sort-keys" onchange="updatePreview()"> 按键排序
                        </label>
                    </div>
                    <div class="option-group">
                        <label>
                            <input type="checkbox" id="show-line-nums" checked onchange="toggleLineNumbers()"> 行号
                        </label>
                    </div>
                </div>

                <div class="editor-wrapper">
                    <div class="editor-panel">
                        <h3>
                            输入 JSON
                            <button class="btn btn-secondary" onclick="formatInput()">格式化</button>
                        </h3>
                        <textarea id="json-input" class="code-editor" placeholder='{"key": "value"}' spellcheck="false"></textarea>
                    </div>
                    <div class="editor-panel">
                        <h3>
                            预览结果
                            <button class="btn btn-secondary" onclick="copyResult()">复制</button>
                        </h3>
                        <div id="json-output" class="preview-panel">输入 JSON 后将在此显示格式化结果</div>
                    </div>
                </div>

                <div id="status-message" class="status"></div>
            </div>

            <div class="tool-content" style="margin-top: 30px;">
                <h3>功能特点</h3>
                <ul style="margin: 15px 0 0 20px; line-height: 2;">
                    <li>实时预览：编辑 JSON 后自动格式化显示</li>
                    <li>语法高亮：键、值、类型区分显示</li>
                    <li>错误提示：JSON 错误时显示错误位置和原因</li>
                    <li>一键复制：快速复制格式化后的结果</li>
                    <li>本地保存：输入内容自动保存到本地存储</li>
                </ul>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 BeJSON. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="../js/app.js"></script>
    <script>
        let indent = 2;
        
        function getIndent() {
            const select = document.getElementById('indent-select');
            return select.value === 'tab' ? '\t' : parseInt(select.value);
        }
        
        function formatInput() {
            const input = document.getElementById('json-input').value;
            if (!input.trim()) {
                showStatus('请输入 JSON 数据', 'error');
                return;
            }
            updatePreview();
            showStatus('格式化完成 ✓', 'success');
        }
        
        function updatePreview() {
            const input = document.getElementById('json-input').value;
            const output = document.getElementById('json-output');
            
            if (!input.trim()) {
                output.innerHTML = '输入 JSON 后将在此显示格式化结果';
                output.className = 'preview-panel';
                return;
            }
            
            indent = getIndent();
            const sortKeys = document.getElementById('sort-keys').checked;
            
            try {
                let parsed = JSON.parse(input);
                if (sortKeys) {
                    parsed = sortObjectKeys(parsed);
                }
                const formatted = JSON.stringify(parsed, null, indent);
                
                output.innerHTML = syntaxHighlight(formatted);
                output.className = 'preview-panel';
                showStatus('JSON 格式正确 ✓', 'success');
            } catch (e) {
                output.textContent = '错误: ' + e.message;
                output.className = 'preview-panel error';
                showStatus('JSON 格式错误: ' + e.message, 'error');
            }
        }
        
        function sortObjectKeys(obj) {
            if (Array.isArray(obj)) {
                return obj.map(sortObjectKeys);
            }
            if (obj !== null && typeof obj === 'object') {
                return Object.keys(obj).sort().reduce((result, key) => {
                    result[key] = sortObjectKeys(obj[key]);
                    return result;
                }, {});
            }
            return obj;
        }
        
        function copyResult() {
            const output = document.getElementById('json-output');
            const text = output.textContent;
            if (text.includes('错误:') || text.includes('输入 JSON')) {
                showStatus('没有可复制的内容', 'error');
                return;
            }
            copyToClipboard(text);
            showStatus('已复制到剪贴板 ✓', 'success');
        }
        
        function toggleLineNumbers() {
            const show = document.getElementById('show-line-nums').checked;
            const editor = document.getElementById('json-input');
            editor.style.paddingLeft = show ? '45px' : '15px';
        }
        
        function showStatus(message, type) {
            const status = document.getElementById('status-message');
            status.textContent = message;
            status.className = 'status ' + type;
            status.style.display = 'block';
            setTimeout(() => {
                status.style.display = 'none';
            }, 3000);
        }
        
        // Auto-update on input
        document.addEventListener('DOMContentLoaded', function() {
            const input = document.getElementById('json-input');
            const saved = localStorage.getItem('bejson_editor_input');
            if (saved) {
                input.value = saved;
                updatePreview();
            }
            
            input.addEventListener('input', function() {
                localStorage.setItem('bejson_editor_input', this.value);
                updatePreview();
            });
        });
        
        window.updatePreview = updatePreview;
    </script>
</body>
</html>
