<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XML 转 JSON - 在线 XML 转换为 JSON - BeJSON</title>
    <meta name="description" content="免费的XML转JSON在线工具，输入XML自动转换为JSON格式。">
    <meta name="keywords" content="XML转JSON,xml to json,XML转换JSON">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo"><a href="/">BeJSON</a></div>
            <nav>
                <ul class="nav-menu">
                    <li><a href="/#tools">工具</a></li>
                    <li><a href="/#code-gen">代码生成</a></li>
                    <li><a href="/#convert">格式转换</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="tool-page">
        <div class="container">
            <div class="tool-page-header">
                <h1>XML 转 JSON</h1>
                <p>输入 XML，自动转换为 JSON 格式</p>
            </div>

            <div class="tool-content">
                <div class="editor-container">
                    <textarea id="xml-input" placeholder='输入 XML 数据，如：<root><name>张三</name><age>20</age></root>'></textarea>
                    <textarea id="output" class="output-area" readonly placeholder="生成的 JSON..."></textarea>
                </div>

                <div class="tool-actions" style="margin-top:20px;">
                    <button class="btn" onclick="convert()">转换</button>
                    <button class="btn btn-secondary" onclick="copyResult()">复制</button>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container"><div class="footer-bottom"><p>&copy; 2026 BeJSON. All rights reserved.</p></div></div>
    </footer>

    <script src="../js/app.js"></script>
    <script>
        function convert() {
            const input = document.getElementById('xml-input').value;
            const output = document.getElementById('output');
            
            if (!input.trim()) {
                showToast('请输入 XML 数据', 'error');
                return;
            }
            
            try {
                const result = xmlToJson(input);
                output.value = JSON.stringify(result, null, 2);
                showToast('转换成功', 'success');
            } catch (e) {
                showToast('转换失败: ' + e.message, 'error');
            }
        }
        
        function xmlToJson(xml) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(xml, 'text/xml');
            
            function parseNode(node) {
                const obj = {};
                
                if (node.nodeType === 3) {
                    return node.textContent.trim();
                }
                
                if (node.nodeType === 1) {
                    for (let i = 0; i < node.attributes.length; i++) {
                        obj['@' + node.attributes[i].name] = node.attributes[i].value;
                    }
                }
                
                for (let i = 0; i < node.childNodes.length; i++) {
                    const child = node.childNodes[i];
                    const nodeName = child.nodeName;
                    
                    if (child.nodeType === 3) {
                        const text = child.textContent.trim();
                        if (text) return text;
                        continue;
                    }
                    
                    const childData = parseNode(child);
                    
                    if (obj[nodeName]) {
                        if (!Array.isArray(obj[nodeName])) {
                            obj[nodeName] = [obj[nodeName]];
                        }
                        obj[nodeName].push(childData);
                    } else {
                        obj[nodeName] = childData;
                    }
                }
                
                return obj;
            }
            
            return parseNode(doc.documentElement);
        }
        
        function copyResult() {
            copyToClipboard(document.getElementById('output').value);
        }
    </script>
</body>
</html>
