<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON 树视图 - 在线可视化 JSON 树形结构 - BeJSON</title>
    <meta name="description" content="免费的JSON树视图在线工具，可视化展示JSON数据的树形结构，支持展开/折叠。">
    <meta name="keywords" content="JSON树视图,json tree view,JSON可视化">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo"><a href="/">BeJSON</a></div>
            <nav>
                <ul class="nav-menu">
                    <li><a href="/#tools">工具</a></li>
                    <li><a href="/#code-gen">代码生成</a></li>
                    <li><a href="/#convert">格式转换</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="tool-page">
        <div class="container">
            <div class="tool-page-header">
                <h1>JSON 树视图</h1>
                <p>可视化展示 JSON 数据的树形结构</p>
            </div>

            <div class="tool-content">
                <div class="tool-actions" style="margin-bottom:20px;">
                    <button class="btn" onclick="convertToTree()">生成树视图</button>
                    <button class="btn btn-secondary" onclick="expandAll()">展开全部</button>
                    <button class="btn btn-secondary" onclick="collapseAll()">折叠全部</button>
                </div>

                <div class="editor-container">
                    <textarea id="json-input" placeholder="输入 JSON 数据..."></textarea>
                    <div id="tree-output" class="tree-view" style="display:none;"></div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container"><div class="footer-bottom"><p>&copy; 2026 BeJSON. All rights reserved.</p></div></div>
    </footer>

    <script src="../js/app.js"></script>
    <script>
        function convertToTree() {
            const input = document.getElementById('json-input').value;
            const output = document.getElementById('tree-output');
            
            if (!input.trim()) {
                showToast('请输入 JSON 数据', 'error');
                return;
            }
            
            try {
                JSON.parse(input);
                output.innerHTML = jsonToTree(input);
                output.style.display = 'block';
                showToast('生成成功', 'success');
            } catch (e) {
                showToast('JSON 格式错误: ' + e.message, 'error');
            }
        }
        
        function expandAll() {
            document.querySelectorAll('.tree-node').forEach(el => {
                el.style.display = 'block';
            });
        }
        
        function collapseAll() {
            document.querySelectorAll('.tree-node').forEach(el => {
                const children = el.querySelectorAll('.tree-node');
                children.forEach(child => child.style.display = 'none');
            });
        }
    </script>
</body>
</html>
