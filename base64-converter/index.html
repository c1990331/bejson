<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64 编解码 - Base64 编码转换 - BeJSON</title>
    <meta name="description" content="免费的Base64编解码工具，支持Base64编码、解码。">
    <meta name="keywords" content="Base64编码,Base64解码,base64">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo"><a href="/">BeJSON</a></div>
            <nav>
                <ul class="nav-menu">
                    <li><a href="/#tools">工具</a></li>
                    <li><a href="/#code-gen">代码生成</a></li>
                    <li><a href="/#utils">辅助工具</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="tool-page">
        <div class="container">
            <div class="tool-page-header">
                <h1>Base64 编解码</h1>
                <p>Base64 编码与解码</p>
            </div>

            <div class="tool-content">
                <div class="editor-container">
                    <textarea id="input" placeholder="输入要编码/解码的内容..."></textarea>
                    <textarea id="output" class="output-area" readonly placeholder="转换结果..."></textarea>
                </div>

                <div class="tool-actions" style="margin-top:20px;">
                    <button class="btn" onclick="base64Encode()">Base64 编码</button>
                    <button class="btn" onclick="base64Decode()">Base64 解码</button>
                    <button class="btn btn-secondary" onclick="copyResult()">复制</button>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container"><div class="footer-bottom"><p>&copy; 2026 BeJSON. All rights reserved.</p></div></div>
    </footer>

    <script src="../js/app.js"></script>
    <script>
        function base64Encode() {
            const input = document.getElementById('input').value;
            try {
                document.getElementById('output').value = btoa(unescape(encodeURIComponent(input)));
                showToast('编码成功', 'success');
            } catch (e) {
                showToast('编码失败: ' + e.message, 'error');
            }
        }
        
        function base64Decode() {
            const input = document.getElementById('input').value;
            try {
                document.getElementById('output').value = decodeURIComponent(escape(atob(input)));
                showToast('解码成功', 'success');
            } catch (e) {
                showToast('解码失败: ' + e.message, 'error');
            }
        }
        
        function copyResult() {
            copyToClipboard(document.getElementById('output').value);
        }
    </script>
</body>
</html>
