<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON 差异对比 - 在线 JSON 对比工具 - BeJSON</title>
    <meta name="description" content="免费的JSON差异对比工具，比较两个JSON的区别，高亮显示差异。">
    <meta name="keywords" content="JSON对比,JSON差异,json diff">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo"><a href="/">BeJSON</a></div>
            <nav>
                <ul class="nav-menu">
                    <li><a href="/#tools">工具</a></li>
                    <li><a href="/#code-gen">代码生成</a></li>
                    <li><a href="/#convert">格式转换</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="tool-page">
        <div class="container">
            <div class="tool-page-header">
                <h1>JSON 差异对比</h1>
                <p>比较两个 JSON 的区别，高亮显示差异</p>
            </div>

            <div class="tool-content">
                <div class="diff-container">
                    <div class="tool-input-area">
                        <label>JSON 1（原始）：</label>
                        <textarea id="json1" placeholder="输入第一个 JSON..."></textarea>
                    </div>
                    <div class="tool-input-area">
                        <label>JSON 2（修改后）：</label>
                        <textarea id="json2" placeholder="输入第二个 JSON..."></textarea>
                    </div>
                </div>

                <div class="tool-actions" style="margin-top:20px;">
                    <button class="btn" onclick="compareJson()">对比</button>
                    <button class="btn btn-secondary" onclick="clearAll()">清空</button>
                </div>

                <div class="tool-output-area" style="margin-top:20px;">
                    <label>对比结果：</label>
                    <div id="diff-output" class="output-area" style="min-height:200px;"></div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container"><div class="footer-bottom"><p>&copy; 2026 BeJSON. All rights reserved.</p></div></div>
    </footer>

    <script>
        function compareJson() {
            const json1 = document.getElementById('json1').value;
            const json2 = document.getElementById('json2').value;
            const output = document.getElementById('diff-output');
            
            if (!json1.trim() || !json2.trim()) {
                showToast('请输入两个 JSON 数据', 'error');
                return;
            }
            
            try {
                const obj1 = JSON.parse(json1);
                const obj2 = JSON.parse(json2);
                
                const diff = findDiff(obj1, obj2, '');
                output.innerHTML = diff || '两个 JSON 完全相同 ✓';
                output.style.display = 'block';
                showToast('对比完成', 'success');
            } catch (e) {
                showToast('JSON 格式错误: ' + e.message, 'error');
            }
        }
        
        function findDiff(obj1, obj2, path) {
            let diff = '';
            
            const keys1 = obj1 && typeof obj1 === 'object' ? Object.keys(obj1) : [];
            const keys2 = obj2 && typeof obj2 === 'object' ? Object.keys(obj2) : [];
            const allKeys = new Set([...keys1, ...keys2]);
            
            for (const key of allKeys) {
                const currentPath = path ? `${path}.${key}` : key;
                
                if (!(key in obj1)) {
                    diff += `<div class="diff-add">+ ${currentPath}: ${JSON.stringify(obj2[key])}</div>`;
                } else if (!(key in obj2)) {
                    diff += `<div class="diff-remove">- ${currentPath}: ${JSON.stringify(obj1[key])}</div>`;
                } else if (JSON.stringify(obj1[key]) !== JSON.stringify(obj2[key])) {
                    if (typeof obj1[key] === 'object' && typeof obj2[key] === 'object') {
                        diff += findDiff(obj1[key], obj2[key], currentPath);
                    } else {
                        diff += `<div class="diff-remove">- ${currentPath}: ${JSON.stringify(obj1[key])}</div>`;
                        diff += `<div class="diff-add">+ ${currentPath}: ${JSON.stringify(obj2[key])}</div>`;
                    }
                }
            }
            
            return diff;
        }
        
        function clearAll() {
            document.getElementById('json1').value = '';
            document.getElementById('json2').value = '';
            document.getElementById('diff-output').style.display = 'none';
        }
    </script>
</body>
</html>
